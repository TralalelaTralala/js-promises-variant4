<!DOCTYPE html>
<html lang="uk">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Weather Dashboard
    </title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Weather Dashboard
        </h1>

        <!-- Ввід міста -->

        <input
            type="text"
            id="cityInput"
            placeholder="Введіть місто"
        >

        <!-- Кнопка -->

        <button id="getWeather">

            Отримати погоду

        </button>

        <!-- Результат -->

        <div id="result"></div>

        <!-- Логи -->

        <h2>
            Логи API
        </h2>

        <ul id="logs"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
